<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIO Screenshot Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div id="aio-editor">
    <!-- Header -->
    <header class="editor-header">
      <div class="header-left">
        <h1 class="editor-title">AIO Screenshot Editor</h1>
        <span class="editor-version">v1.0-beta</span>
      </div>
      <div class="header-right">
        <button id="btnCloseEditor" class="header-btn close-btn" title="Close Editor">✕</button>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="editor-toolbar">
      <div class="tool-group">
        <span class="tool-label">Tools</span>
        <div class="tool-buttons">
          <button class="tool-btn active" data-tool="select" title="Select/Move">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M5 2l14 9-9 2-5 11V2z"/></svg>
          </button>
          <button class="tool-btn" data-tool="crop" title="Crop">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 15h2V7c0-1.1-.9-2-2-2H9v2h8v8zM7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7z"/></svg>
          </button>
          <button class="tool-btn" data-tool="marker" title="Color Marker">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </button>
          <button class="tool-btn" data-tool="text" title="Add Text">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
          </button>
          <button class="tool-btn" data-tool="arrow" title="Arrow">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.01 11H4v2h12.01v3L20 12l-3.99-4z"/></svg>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5z"/></svg>
          </button>
          <button class="tool-btn" data-tool="circle" title="Circle">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 0 1-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0zM4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l1.41-1.41-6.36-6.36-1.42 1.41c-.78.79-.78 2.05 0 2.83z"/></svg>
          </button>
        </div>
      </div>

      <div class="tool-group">
        <span class="tool-label">Color</span>
        <div class="color-picker-wrap">
          <input type="color" id="markerColor" value="#dc143c" class="color-input" />
          <div class="color-presets">
            <button class="color-preset" data-color="#dc143c" style="background:#dc143c" title="Crimson"></button>
            <button class="color-preset" data-color="#d4a017" style="background:#d4a017" title="Dead Yellow"></button>
            <button class="color-preset" data-color="#22c55e" style="background:#22c55e" title="Green"></button>
            <button class="color-preset" data-color="#3b82f6" style="background:#3b82f6" title="Blue"></button>
            <button class="color-preset" data-color="#ffffff" style="background:#ffffff; border:1px solid #666" title="White"></button>
            <button class="color-preset" data-color="#000000" style="background:#000000" title="Black"></button>
          </div>
        </div>
      </div>

      <div class="tool-group">
        <span class="tool-label">Size</span>
        <input type="range" id="brushSize" min="1" max="20" value="4" class="brush-size" />
        <span id="brushSizeValue" class="brush-size-value">4px</span>
      </div>

      <div class="tool-group">
        <span class="tool-label">Text</span>
        <input type="text" id="textInput" placeholder="Type text..." class="text-input" />
        <select id="fontSize" class="font-size-select">
          <option value="12">12px</option>
          <option value="16" selected>16px</option>
          <option value="24">24px</option>
          <option value="32">32px</option>
          <option value="48">48px</option>
        </select>
      </div>

      <div class="tool-group">
        <span class="tool-label">Actions</span>
        <div class="action-buttons">
          <button id="btnUndo" class="editor-action-btn" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
          </button>
          <button id="btnRedo" class="editor-action-btn" title="Redo (Ctrl+Y)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
          </button>
          <div class="action-divider"></div>
          <button id="btnDownloadScreenshot" class="editor-action-btn save-btn" title="Download">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Canvas Container -->
    <div class="canvas-container">
      <div class="canvas-wrapper">
        <canvas id="screenshotCanvas"></canvas>
        <!-- Crop overlay -->
        <div id="cropOverlay" class="crop-overlay hidden">
          <div class="crop-area"></div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <footer class="editor-footer">
      <span id="statusText">Ready</span>
      <span id="canvasInfo"></span>
      <span class="author-info">AIO v1.0-beta by Bishal Aryal</span>
    </footer>
  </div>

  <script src="editor.js"></script>
</body>
</html>
